name: Bandit

on:
  push:
    branches: [ github-action, main ]
  pull_request:
    branches: [ github-action, main ]

permissions:
  contents: read

jobs:
  bandit-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run Bandit Analysis
        run: |
          bandit -r .
